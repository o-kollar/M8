<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M8 Cron Scheduler</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: #e2e8f0; font-family: ui-sans-serif, system-ui, sans-serif; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        .terminal { font-family: 'Fira Code', monospace; background: #000; color: #10b981; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #1e293b; }
        ::-webkit-scrollbar-thumb { background: #475569; border-radius: 4px; }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-6xl mx-auto">
        <header class="flex justify-between items-center mb-8">
            <h1 class="text-3xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-emerald-400">
                🚀 M8 Scheduler
            </h1>
            <button onclick="showModal()" class="bg-blue-600 hover:bg-blue-500 text-white px-4 py-2 rounded-lg font-semibold transition shadow-lg shadow-blue-900/20">
                + Create Job
            </button>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <!-- Job List -->
            <div class="lg:col-span-1 glass rounded-xl p-6 h-fit">
                <h2 class="text-xl font-semibold mb-4 border-b border-slate-700 pb-2 flex items-center">
                    <span class="mr-2 text-blue-400">●</span> Active Jobs
                </h2>
                <div id="jobList" class="space-y-3">
                    <!-- Jobs injected here -->
                </div>
            </div>

            <!-- Live Logs -->
            <div class="lg:col-span-2 flex flex-col gap-4">
                <div class="glass rounded-xl p-4 flex-grow">
                    <div class="flex justify-between items-center mb-2">
                        <h2 class="text-xl font-semibold flex items-center">
                            <span class="mr-2 text-emerald-400">●</span> Live System Logs
                        </h2>
                        <button onclick="clearLogs()" class="text-xs text-slate-400 hover:text-white uppercase tracking-wider transition">Clear</button>
                    </div>
                    <div id="terminal" class="terminal p-4 rounded-lg h-[600px] overflow-y-auto text-sm leading-relaxed whitespace-pre-wrap shadow-inner border border-slate-800"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Create/Edit Modal -->
    <div id="modal" class="fixed inset-0 bg-black/60 hidden flex items-center justify-center p-4 z-50 animate-in fade-in duration-200">
        <div class="glass max-w-lg w-full rounded-2xl p-8 shadow-2xl">
            <h2 id="modalTitle" class="text-2xl font-bold mb-6">Create New Job</h2>
            <form id="jobForm" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium mb-1 text-slate-300">Job Name</label>
                    <input type="text" id="jobName" required class="w-full bg-slate-900 border border-slate-700 rounded-lg p-2 focus:ring-2 focus:ring-blue-500 outline-none">
                </div>
                <div>
                    <label class="block text-sm font-medium mb-1 text-slate-300">Cron Schedule</label>
                    <input type="text" id="jobSchedule" required placeholder="0 0 * * *" class="w-full bg-slate-900 border border-slate-700 rounded-lg p-2 focus:ring-2 focus:ring-blue-500 outline-none">
                </div>
                <div>
                    <label class="block text-sm font-medium mb-1 text-slate-300">Model Name</label>
                    <input type="text" id="jobModel" value="gemini-3.1-flash-lite-preview" class="w-full bg-slate-900 border border-slate-700 rounded-lg p-2 focus:ring-2 focus:ring-blue-500 outline-none">
                </div>
                <div>
                    <label class="block text-sm font-medium mb-1 text-slate-300">Instructions (Markdown)</label>
                    <textarea id="jobInstructions" rows="6" class="w-full bg-slate-900 border border-slate-700 rounded-lg p-2 focus:ring-2 focus:ring-blue-500 outline-none font-mono text-sm"></textarea>
                </div>
                <div class="flex gap-3 pt-4">
                    <button type="button" onclick="hideModal()" class="flex-1 px-4 py-2 border border-slate-600 rounded-lg hover:bg-slate-800 transition">Cancel</button>
                    <button type="submit" class="flex-1 px-4 py-2 bg-blue-600 rounded-lg hover:bg-blue-500 font-bold transition">Save Job</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        let isEditing = false;

        async function fetchJobs() {
            const res = await fetch('/jobs');
            const jobs = await res.json();
            const container = document.getElementById('jobList');
            container.innerHTML = jobs.map(job => `
                <div class="p-4 rounded-lg bg-slate-800/50 border border-slate-700 hover:border-blue-500 transition group">
                    <div class="flex justify-between items-start mb-2">
                        <h3 class="font-bold text-blue-300">${job.name}</h3>
                        <span class="text-[10px] bg-slate-700 px-2 py-0.5 rounded uppercase text-slate-300">${job.llm}</span>
                    </div>
                    <p class="text-xs text-slate-400 mb-4 font-mono tracking-tighter">${job.schedule}</p>
                    <div class="flex gap-2">
                        <button onclick="runJob('${job.name}')" class="text-xs bg-emerald-600/20 hover:bg-emerald-600 text-emerald-400 hover:text-white px-3 py-1 rounded transition">Run Now</button>
                        <button onclick="editJob('${job.name}')" class="text-xs bg-blue-600/20 hover:bg-blue-600 text-blue-400 hover:text-white px-3 py-1 rounded transition">Edit</button>
                    </div>
                </div>
            `).join('');
        }

        async function runJob(name) {
            const res = await fetch(`/run/${name}`, { method: 'POST' });
            const data = await res.json();
            console.log(`Triggered ${name}:`, data);
        }

        async function editJob(name) {
            const res = await fetch(`/jobs/${name}`);
            const job = await res.json();
            document.getElementById('jobName').value = job.name;
            document.getElementById('jobName').disabled = true;
            document.getElementById('jobSchedule').value = job.schedule;
            document.getElementById('jobModel').value = job.llm;
            document.getElementById('jobInstructions').value = job.instructions;
            
            isEditing = true;
            document.getElementById('modalTitle').innerText = 'Edit Job';
            showModal();
        }

        function showModal() {
            if (!isEditing) {
                document.getElementById('jobForm').reset();
                document.getElementById('jobName').disabled = false;
                document.getElementById('modalTitle').innerText = 'Create New Job';
            }
            document.getElementById('modal').classList.remove('hidden');
        }

        function hideModal() {
            document.getElementById('modal').classList.add('hidden');
            isEditing = false;
        }

        document.getElementById('jobForm').onsubmit = async (e) => {
            e.preventDefault();
            const name = document.getElementById('jobName').value;
            const payload = {
                name,
                schedule: document.getElementById('jobSchedule').value,
                llm: document.getElementById('jobModel').value,
                instructionsContent: document.getElementById('jobInstructions').value
            };

            const method = isEditing ? 'PUT' : 'POST';
            const url = isEditing ? `/jobs/${name}` : '/jobs';

            const res = await fetch(url, {
                method,
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            if (res.ok) {
                hideModal();
                fetchJobs();
            } else {
                const err = await res.json();
                alert(err.error);
            }
        };

        function initLogStream() {
            const terminal = document.getElementById('terminal');
            const eventSource = new EventSource('/logs/stream');

            eventSource.onmessage = (event) => {
                const data = JSON.parse(event.data);
                const line = document.createElement('div');
                line.className = 'py-0.5 border-b border-white/5 font-mono';
                
                // Simple ANSI color parsing for the terminal UI
                let text = data.line
                    .replace(/\[32m/g, '<span class="text-emerald-400">')
                    .replace(/\[31m/g, '<span class="text-red-400">')
                    .replace(/\[34m/g, '<span class="text-blue-400">')
                    .replace(/\[33m/g, '<span class="text-yellow-400">')
                    .replace(/\[36m/g, '<span class="text-cyan-400">')
                    .replace(/\[39m|\[0m/g, '</span>');

                line.innerHTML = `<span class="text-slate-600 mr-2">$</span>${text}`;
                terminal.appendChild(line);
                terminal.scrollTop = terminal.scrollHeight;
            };

            eventSource.onerror = () => {
                console.warn("Log stream disconnected. Reconnecting...");
            };
        }

        function clearLogs() {
            document.getElementById('terminal').innerHTML = '';
        }

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') hideModal();
        });

        document.getElementById('modal').onclick = (e) => {
            if (e.target.id === 'modal') hideModal();
        };

        fetchJobs();
        initLogStream();
    </script>
</body>
</html>
