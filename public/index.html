<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M8 Cron Scheduler</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg: #0a0c10;
            --surface: #111318;
            --surface2: #181c24;
            --border: #1f2430;
            --accent: #00e5a0;
            --accent2: #0090ff;
            --danger: #ff4b6e;
            --warn: #f5a623;
            --text: #e8eaf0;
            --muted: #4a5068;
            --muted2: #6b7490;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Syne', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Grid background */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(0,229,160,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,229,160,0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
            z-index: 0;
        }

        .wrapper {
            position: relative;
            z-index: 1;
            max-width: 1280px;
            margin: 0 auto;
            padding: 40px 24px;
        }

        /* ── HEADER ── */
        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 48px;
            padding-bottom: 24px;
            border-bottom: 1px solid var(--border);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .logo-icon {
            width: 44px;
            height: 44px;
            background: var(--accent);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--bg);
            font-size: 1.2em;
            flex-shrink: 0;
        }

        .logo-text h1 {
            font-size: 1.4em;
            font-weight: 800;
            letter-spacing: -0.5px;
            color: var(--text);
            line-height: 1;
        }

        .logo-text span {
            font-family: 'Space Mono', monospace;
            font-size: 0.72em;
            color: var(--muted2);
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .status-pill {
            display: flex;
            align-items: center;
            gap: 8px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 99px;
            padding: 6px 14px;
            font-family: 'Space Mono', monospace;
            font-size: 0.75em;
            color: var(--muted2);
        }

        .status-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: var(--accent);
            box-shadow: 0 0 8px var(--accent);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        /* ── LAYOUT ── */
        .grid {
            display: grid;
            grid-template-columns: 1fr 420px;
            gap: 20px;
            margin-bottom: 20px;
        }

        @media (max-width: 1050px) {
            .grid { grid-template-columns: 1fr; }
        }

        /* ── PANEL ── */
        .panel {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 14px;
            overflow: hidden;
        }

        .panel-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 18px 22px;
            border-bottom: 1px solid var(--border);
            background: var(--surface2);
        }

        .panel-title {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.9em;
            font-weight: 600;
            letter-spacing: 0.04em;
            text-transform: uppercase;
            color: var(--muted2);
        }

        .panel-title i {
            color: var(--accent);
            font-size: 0.95em;
        }

        .panel-body {
            padding: 22px;
        }

        /* ── BUTTONS ── */
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 7px;
            padding: 9px 18px;
            border: none;
            border-radius: 8px;
            font-family: 'Syne', sans-serif;
            font-size: 0.85em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.15s ease;
            white-space: nowrap;
        }

        .btn-accent {
            background: var(--accent);
            color: var(--bg);
        }
        .btn-accent:hover {
            background: #00ffb3;
            box-shadow: 0 0 20px rgba(0,229,160,0.3);
            transform: translateY(-1px);
        }

        .btn-ghost {
            background: transparent;
            color: var(--muted2);
            border: 1px solid var(--border);
        }
        .btn-ghost:hover {
            border-color: var(--muted2);
            color: var(--text);
            transform: translateY(-1px);
        }

        .btn-blue {
            background: rgba(0,144,255,0.12);
            color: var(--accent2);
            border: 1px solid rgba(0,144,255,0.2);
        }
        .btn-blue:hover {
            background: rgba(0,144,255,0.2);
            box-shadow: 0 0 12px rgba(0,144,255,0.2);
        }

        .btn-danger {
            background: rgba(255,75,110,0.08);
            color: var(--danger);
            border: 1px solid rgba(255,75,110,0.15);
        }
        .btn-danger:hover {
            background: rgba(255,75,110,0.15);
        }

        .btn-sm {
            padding: 6px 12px;
            font-size: 0.78em;
        }

        /* ── JOB CARDS ── */
        #jobs-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .job-card {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 16px 18px;
            display: flex;
            align-items: center;
            gap: 16px;
            transition: border-color 0.2s, transform 0.2s;
            animation: slideIn 0.3s ease both;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(8px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .job-card:hover {
            border-color: rgba(0,229,160,0.2);
            transform: translateX(3px);
        }

        .job-indicator {
            width: 36px;
            height: 36px;
            border-radius: 8px;
            background: rgba(0,229,160,0.1);
            border: 1px solid rgba(0,229,160,0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--accent);
            font-size: 0.85em;
            flex-shrink: 0;
        }

        .job-info {
            flex: 1;
            min-width: 0;
        }

        .job-name {
            font-size: 0.95em;
            font-weight: 600;
            color: var(--text);
            margin-bottom: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .job-meta {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .job-badge {
            font-family: 'Space Mono', monospace;
            font-size: 0.7em;
            color: var(--muted2);
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 5px;
            padding: 2px 8px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .job-badge i {
            font-size: 0.85em;
        }

        .job-actions {
            display: flex;
            gap: 6px;
            flex-shrink: 0;
        }

        /* ── FORM ── */
        .form-group {
            margin-bottom: 16px;
        }

        .form-label {
            display: flex;
            align-items: center;
            gap: 7px;
            font-size: 0.78em;
            font-weight: 600;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            color: var(--muted2);
            margin-bottom: 7px;
        }

        .form-label i {
            color: var(--accent);
        }

        .form-input, .form-textarea {
            width: 100%;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 10px 14px;
            color: var(--text);
            font-family: 'Space Mono', monospace;
            font-size: 0.85em;
            transition: border-color 0.2s, box-shadow 0.2s;
            outline: none;
        }

        .form-input:focus, .form-textarea:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(0,229,160,0.08);
        }

        .form-input::placeholder, .form-textarea::placeholder {
            color: var(--muted);
        }

        .form-textarea {
            resize: vertical;
            min-height: 180px;
            line-height: 1.6;
        }

        .form-hint {
            font-family: 'Space Mono', monospace;
            font-size: 0.7em;
            color: var(--muted);
            margin-top: 5px;
        }

        .form-actions {
            display: flex;
            gap: 8px;
            padding-top: 4px;
        }

        /* ── CONSOLE ── */
        .console-panel {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 14px;
            overflow: hidden;
        }

        .console-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 18px;
            background: var(--surface2);
            border-bottom: 1px solid var(--border);
        }

        .console-dots {
            display: flex;
            gap: 6px;
        }

        .dot {
            width: 11px;
            height: 11px;
            border-radius: 50%;
        }
        .dot-red   { background: #ff5f57; }
        .dot-yellow{ background: #febc2e; }
        .dot-green { background: #28c840; }

        .console-label {
            font-family: 'Space Mono', monospace;
            font-size: 0.72em;
            color: var(--muted);
        }

        #output {
            padding: 16px 20px;
            height: 220px;
            overflow-y: auto;
            font-family: 'Space Mono', monospace;
            font-size: 0.78em;
            line-height: 1.7;
            scrollbar-width: thin;
            scrollbar-color: var(--border) transparent;
        }

        #output::-webkit-scrollbar { width: 4px; }
        #output::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

        .log-line {
            display: flex;
            gap: 12px;
            padding: 2px 0;
            border-bottom: 1px solid rgba(255,255,255,0.03);
            animation: fadeIn 0.2s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to   { opacity: 1; }
        }

        .log-time {
            color: var(--muted);
            flex-shrink: 0;
        }

        .log-msg { color: var(--muted2); }
        .log-msg.success { color: var(--accent); }
        .log-msg.error   { color: var(--danger); }
        .log-msg.info    { color: var(--accent2); }
        .log-msg.warn    { color: var(--warn); }

        #output:empty::after {
            content: '> Waiting for events...';
            color: var(--muted);
        }

        /* ── EMPTY STATE ── */
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 48px 20px;
            text-align: center;
            gap: 12px;
        }

        .empty-state-icon {
            width: 56px;
            height: 56px;
            border-radius: 14px;
            background: var(--surface2);
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.4em;
            color: var(--muted);
            margin-bottom: 4px;
        }

        .empty-state h3 {
            font-size: 1em;
            font-weight: 600;
            color: var(--muted2);
        }

        .empty-state p {
            font-size: 0.82em;
            color: var(--muted);
            max-width: 200px;
        }

        /* ── DIVIDER ── */
        .divider {
            height: 1px;
            background: var(--border);
            margin: 18px 0;
        }

        /* responsive */
        @media (max-width: 640px) {
            header { flex-direction: column; align-items: flex-start; gap: 12px; }
            .job-card { flex-wrap: wrap; }
            .job-actions { width: 100%; justify-content: flex-end; }
        }
    </style>
</head>
<body>
<div class="wrapper">

    <!-- HEADER -->
    <header>
        <div class="logo">
            <div class="logo-icon"><i class="fas fa-bolt"></i></div>
            <div class="logo-text">
                <h1>M8 Cron</h1>
                <span>Job Scheduler v1.0</span>
            </div>
        </div>
        <div class="header-right">
            <div class="status-pill">
                <div class="status-dot"></div>
                scheduler active
            </div>
        </div>
    </header>

    <!-- MAIN GRID -->
    <div class="grid">

        <!-- JOBS PANEL -->
        <div class="panel">
            <div class="panel-header">
                <div class="panel-title">
                    <i class="fas fa-layer-group"></i>
                    Scheduled Jobs
                </div>
                <button class="btn btn-accent btn-sm" onclick="loadJobs()">
                    <i class="fas fa-arrows-rotate"></i> Refresh
                </button>
            </div>
            <div class="panel-body">
                <ul id="jobs-list"></ul>
                <div id="empty-jobs" class="empty-state">
                    <div class="empty-state-icon"><i class="fas fa-inbox"></i></div>
                    <h3>No jobs yet</h3>
                    <p>Create your first job using the form on the right.</p>
                </div>
            </div>
        </div>

        <!-- FORM PANEL -->
        <div class="panel">
            <div class="panel-header">
                <div class="panel-title">
                    <i class="fas fa-pen-to-square"></i>
                    <span id="form-panel-title">New Job</span>
                </div>
            </div>
            <div class="panel-body">
                <div class="form-group">
                    <div class="form-label"><i class="fas fa-tag"></i> Job Name</div>
                    <input class="form-input" id="job-name" placeholder="e.g., daily-backup" />
                </div>

                <div class="form-group">
                    <div class="form-label"><i class="fas fa-clock"></i> Cron Expression</div>
                    <input class="form-input" id="job-schedule" placeholder="* * * * *" />
                    <div class="form-hint">min · hour · day · month · weekday</div>
                </div>

                <div class="form-group">
                    <div class="form-label"><i class="fas fa-file-code"></i> Script Filename</div>
                    <input class="form-input" id="job-script" placeholder="script.js" />
                </div>

                <div class="form-group">
                    <div class="form-label"><i class="fas fa-code"></i> Script Content</div>
                    <textarea class="form-textarea" id="job-script-content" placeholder="// Your JavaScript code here..."></textarea>
                </div>

                <div class="form-actions">
                    <button class="btn btn-accent" onclick="saveJob()">
                        <i class="fas fa-floppy-disk"></i>
                        <span id="save-btn-text">Save Job</span>
                    </button>
                    <button class="btn btn-ghost" onclick="clearForm()">
                        <i class="fas fa-xmark"></i> Clear
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- CONSOLE -->
    <div class="console-panel">
        <div class="console-header">
            <div class="console-dots">
                <div class="dot dot-red"></div>
                <div class="dot dot-yellow"></div>
                <div class="dot dot-green"></div>
            </div>
            <div class="console-label">output console</div>
            <button class="btn btn-ghost btn-sm" onclick="clearConsole()">
                <i class="fas fa-trash-can"></i> Clear
            </button>
        </div>
        <div id="output"></div>
    </div>

</div>

<script>
    let editingJobName = null;

    async function loadJobs() {
        try {
            const response = await fetch('/jobs');
            const jobs = await response.json();
            renderJobs(jobs);
            log(`Loaded ${jobs.length} job${jobs.length !== 1 ? 's' : ''}`, 'success');
        } catch (e) {
            log('Failed to load jobs: ' + e.message, 'error');
        }
    }

    function renderJobs(jobs) {
        const list = document.getElementById('jobs-list');
        const empty = document.getElementById('empty-jobs');
        list.innerHTML = '';

        if (!jobs.length) {
            empty.style.display = 'flex';
            return;
        }
        empty.style.display = 'none';

        jobs.forEach((job, i) => {
            const li = document.createElement('li');
            li.className = 'job-card';
            li.style.animationDelay = `${i * 0.05}s`;
            li.innerHTML = `
                <div class="job-indicator"><i class="fas fa-circle-notch"></i></div>
                <div class="job-info">
                    <div class="job-name">${job.name}</div>
                    <div class="job-meta">
                        <span class="job-badge"><i class="fas fa-clock"></i>${job.schedule}</span>
                        <span class="job-badge"><i class="fas fa-file"></i>${job.script}</span>
                    </div>
                </div>
                <div class="job-actions">
                    <button class="btn btn-accent btn-sm" onclick="runJob('${job.name}')">
                        <i class="fas fa-play"></i>
                    </button>
                    <button class="btn btn-blue btn-sm" onclick="editJob('${job.name}')">
                        <i class="fas fa-pen"></i>
                    </button>
                </div>
            `;
            list.appendChild(li);
        });
    }

    async function runJob(name) {
        log(`Running job: ${name}...`, 'info');
        try {
            const r = await fetch(`/run/${name}`, { method: 'POST' });
            const data = await r.json();
            r.ok ? log(data.message, 'success') : log(data.error, 'error');
        } catch (e) {
            log('Run failed: ' + e.message, 'error');
        }
    }

    async function editJob(name) {
        try {
            const r = await fetch(`/jobs/${name}`);
            const data = await r.json();
            if (r.ok) {
                document.getElementById('job-name').value = data.name;
                document.getElementById('job-schedule').value = data.schedule;
                document.getElementById('job-script').value = data.script;
                document.getElementById('job-script-content').value = data.scriptContent;
                editingJobName = name;
                document.getElementById('save-btn-text').textContent = 'Update Job';
                document.getElementById('form-panel-title').textContent = 'Edit Job';
                document.getElementById('job-form-section')?.scrollIntoView({ behavior: 'smooth' });
                log(`Editing: ${name}`, 'info');
            } else {
                log(data.error, 'error');
            }
        } catch (e) {
            log('Load failed: ' + e.message, 'error');
        }
    }

    async function saveJob() {
        const name = document.getElementById('job-name').value.trim();
        const schedule = document.getElementById('job-schedule').value.trim();
        const script = document.getElementById('job-script').value.trim();
        const scriptContent = document.getElementById('job-script-content').value.trim();

        if (!name || !schedule || !script || !scriptContent) {
            log('All fields are required', 'warn');
            return;
        }

        const method = editingJobName ? 'PUT' : 'POST';
        const url = editingJobName ? `/jobs/${editingJobName}` : '/jobs';
        const body = editingJobName ? { schedule, script, scriptContent } : { name, schedule, script, scriptContent };

        try {
            const r = await fetch(url, {
                method,
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(body)
            });
            const data = await r.json();
            if (r.ok) {
                log(`${editingJobName ? 'Updated' : 'Created'} job: ${name}`, 'success');
                clearForm();
                loadJobs();
            } else {
                log(data.error, 'error');
            }
        } catch (e) {
            log('Save failed: ' + e.message, 'error');
        }
    }

    function clearForm() {
        ['job-name','job-schedule','job-script','job-script-content'].forEach(id => {
            document.getElementById(id).value = '';
        });
        editingJobName = null;
        document.getElementById('save-btn-text').textContent = 'Save Job';
        document.getElementById('form-panel-title').textContent = 'New Job';
        log('Form cleared', 'info');
    }

    function clearConsole() {
        document.getElementById('output').innerHTML = '';
    }

    function log(msg, type = '') {
        const out = document.getElementById('output');
        const line = document.createElement('div');
        line.className = 'log-line';
        const t = new Date().toLocaleTimeString('en-US', { hour12: false });
        line.innerHTML = `<span class="log-time">${t}</span><span class="log-msg ${type}">${msg}</span>`;
        out.appendChild(line);
        out.scrollTop = out.scrollHeight;
    }

    window.addEventListener('load', () => {
        log('M8 Cron Scheduler initialized', 'success');
        loadJobs();
    });
</script>
</body>
</html>
